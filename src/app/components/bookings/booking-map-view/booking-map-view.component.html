<div class="map-view-container">
  <div class="map-legend">
    <div class="legend-item">
      <span class="legend-dot" style="background: #f59e0b;"></span>
      <span>En attente</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: #3b82f6;"></span>
      <span>Confirmée</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: #c3ff00;"></span>
      <span>En cours</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: #22c55e;"></span>
      <span>Terminée</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: #ef4444;"></span>
      <span>Rejetée</span>
    </div>
    <div class="legend-item">
      <span class="legend-dot" style="background: #6b7280;"></span>
      <span>Annulée</span>
    </div>
  </div>

  <div class="map-stats">
    <span class="stat-badge">{{ bookings.length }} réservation{{ bookings.length !== 1 ? 's' : '' }}</span>
  </div>

  <div #mapContainer class="map"></div>

  <div *ngIf="bookings.length === 0" class="map-empty-overlay">
    <div class="empty-content">
      <span class="empty-icon">🗺️</span>
      <p>Aucune réservation à afficher sur la carte</p>
    </div>
  </div>
</div>
